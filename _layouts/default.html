<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="logo">
      <span class="logo-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="1.5" fill="white" opacity="0.9"/>
          <rect x="13" y="3" width="8" height="8" rx="1.5" fill="white" opacity="0.55"/>
          <rect x="3" y="13" width="8" height="8" rx="1.5" fill="white" opacity="0.55"/>
          <rect x="13" y="13" width="8" height="8" rx="1.5" fill="white" opacity="0.25"/>
          <path d="M13 8L16 11M16 11L19 8M16 11L16 16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="logo-text">mine<span class="accent">strate</span></span>
    </a>
    <nav class="site-nav">
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}" class="nav-link {% if page.url == item.url %}active{% endif %}">{{ item.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer class="site-footer">
  <div class="container">
    <span>minestrate · MIT License</span>
    <a href="https://github.com/minestrate/orchestrator">github.com/minestrate</a>
  </div>
</footer>

</body>
</html>
